<style>
  #zrange-bar {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.96); border: 1px solid #bbb;
    border-radius: 8px; padding: 7px 18px; display: flex;
    align-items: center; gap: 10px; font-family: Arial, sans-serif;
    font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 9999;
  }
  #zrange-bar label { font-weight: bold; color: #444; white-space: nowrap; }
  #zrange-bar input {
    width: 80px; padding: 3px 6px; border: 1px solid #aaa;
    border-radius: 4px; font-size: 13px; text-align: center;
  }
  #zrange-bar button {
    padding: 4px 14px; background: #4363d8; color: white; border: none;
    border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  #zrange-bar button:hover { background: #2c4ab8; }
  #zrange-reset { background: #eee !important; color: #333 !important;
                  border: 1px solid #bbb !important; font-weight: normal !important; }
  #zrange-reset:hover { background: #ddd !important; }
</style>
<div id="zrange-bar">
  <label>Band RMS velocity (mm/s) range:</label>
  <input id="zmin" type="number" placeholder="min" step="any" value="0" />
  <span style="color:#888">–</span>
  <input id="zmax" type="number" placeholder="max" step="any" />
  <button onclick="applyZRange()">Apply</button>
  <button id="zrange-reset" onclick="resetZRange()">Reset</button>
</div>
<script>
  var _plotDiv = null, _defaultZMax = null;
  function getPlotDiv() {
    if (_plotDiv) return _plotDiv;
    var divs = document.querySelectorAll('.plotly-graph-div');
    _plotDiv = divs.length ? divs[0] : null; return _plotDiv;
  }
  function applyZRange() {
    var d = getPlotDiv(); if (!d) return;
    var zmin = parseFloat(document.getElementById('zmin').value);
    var zmax = parseFloat(document.getElementById('zmax').value);
    if (isNaN(zmin) || isNaN(zmax) || zmin >= zmax) { alert('Please enter valid min < max values.'); return; }
    Plotly.relayout(d, { 'scene.zaxis.range': [zmin, zmax] });
  }
  function resetZRange() {
    var d = getPlotDiv(); if (!d) return;
    var zmax = _defaultZMax !== null ? _defaultZMax : undefined;
    Plotly.relayout(d, { 'scene.zaxis.range': [0, zmax] });
    document.getElementById('zmin').value = '0';
    document.getElementById('zmax').value = zmax !== undefined ? zmax : '';
  }
  window.addEventListener('load', function() {
    setTimeout(function() {
      var d = getPlotDiv();
      if (d && d.layout && d.layout.scene && d.layout.scene.zaxis) {
        var r = d.layout.scene.zaxis.range;
        if (r && r.length === 2) { _defaultZMax = r[1]; document.getElementById('zmax').value = parseFloat(r[1].toFixed(4)); }
      }
    }, 600);
  });
  ['zmin','zmax'].forEach(function(id) {
    document.getElementById(id).addEventListener('keydown', function(e) { if (e.key === 'Enter') applyZRange(); });
  });
</script>
